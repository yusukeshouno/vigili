# /etc/nginx/sites-available/sentinel-relay
#
# Sentinel Relay 用 nginx site config。
# - WSS は /v1/agents/, /v1/clients/ の Upgrade を proxy_pass
# - REST はそのまま localhost:3030 へ
# - 証明書は certbot --nginx で取得 (Let's Encrypt)
#
# 使い方:
#   sudo cp nginx-relay.conf /etc/nginx/sites-available/sentinel-relay
#   sudo sed -i 's|__RELAY_FQDN__|relay.yourdomain.com|g' \
#     /etc/nginx/sites-available/sentinel-relay
#   sudo ln -sf /etc/nginx/sites-available/sentinel-relay \
#     /etc/nginx/sites-enabled/sentinel-relay
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d relay.yourdomain.com

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name __RELAY_FQDN__;

    # ACME challenge 以外は HTTPS に飛ばす
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __RELAY_FQDN__;

    # certbot --nginx が以下を埋める
    # ssl_certificate     /etc/letsencrypt/live/__RELAY_FQDN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__RELAY_FQDN__/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # body 上限 (ペアリング作成等は小さい JSON のみ、念のため)
    client_max_body_size 64k;

    # WS は長く張る。decision 待機などで idle が伸びる想定。
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
    proxy_connect_timeout 10s;

    location / {
        proxy_pass http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (REST にも害はない)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # /healthz は素早く返したいのでバッファリング無効化
    location = /healthz {
        proxy_pass http://127.0.0.1:3030/healthz;
        proxy_buffering off;
        access_log off;
    }
}
