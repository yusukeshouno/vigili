# xcodegen の declarative project 設定。
# `brew install xcodegen` 後、このディレクトリで `xcodegen` を実行すると
# Vigili.xcodeproj が生成される。
#
# 手で .xcodeproj を編集しない (xcodegen で再生成される)。
# 設定変更はこの project.yml だけを触る。

name: Vigili

schemes:
  Vigili:
    build:
      targets:
        Vigili: all
        VigiliWidget: [build]
    run:
      config: Debug
      environmentVariables:
        IDEPreferLogStreaming: YES
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  VigiliMobile:
    build:
      targets:
        VigiliMobile: all
        VigiliActivity: [build]
    run:
      config: Debug
      environmentVariables:
        IDEPreferLogStreaming: YES
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

options:
  bundleIdPrefix: io.vigili
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: false
  postGenCommand: find Vigili.xcodeproj/xcshareddata/xcschemes -name "*.xcscheme" -exec sed -i '' 's/allowLocationSimulation = "YES">/allowLocationSimulation = "YES"\n      consoleMode = "0">/g' {} \;

settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    # ターゲットごとの個別 deploymentTarget は targets 側で指定。
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "2DG598WNT9" # Personal Team (YUSUKE SHONO)
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  # ============================================================
  # macOS: メニューバー常駐アプリ
  # ============================================================
  Vigili:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Sources/Vigili
      - path: Sources/Shared
      # Asset Catalog (Mac/iOS のアイコン + 起動画面色)
      - path: Assets.xcassets
        buildPhase: resources
      # フォント
      - path: Resources/Fonts/BricolageGrotesque.ttf
        buildPhase: resources
      - path: Resources/Fonts/JetBrainsMono.ttf
        buildPhase: resources
    dependencies:
      - target: VigiliWidget
        embed: true
        copy:
          # Mac の widget extension は `Contents/PlugIns/` に置く必要がある。
          # (iOS の Extensions は `PlugIns/`、Mac は `Contents/PlugIns/`)
          destination: plugins
    info:
      path: Resources/Info.plist
      properties:
        LSUIElement: true
        NSHumanReadableCopyright: "© 2026 Vigili"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ATSApplicationFontsPath: "Fonts"
        UIAppFonts:
          - "BricolageGrotesque.ttf"
          - "JetBrainsMono.ttf"
    settings:
      base:
        PRODUCT_NAME: Vigili
        PRODUCT_BUNDLE_IDENTIFIER: io.vigili.app.shono
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        ENABLE_HARDENED_RUNTIME: "NO"
        SKIP_INSTALL: "NO"
        # Mac は iOS と別の Asset Catalog icon set を使う
        ASSETCATALOG_COMPILER_APPICON_NAME: MacAppIcon
        # Personal Team で signing して widget が macOS 26 chronod に
        # 認識されるようにする
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "2DG598WNT9"
    entitlements:
      path: Resources/Vigili.entitlements
      properties:
        com.apple.security.app-sandbox: false
        # Widget (サンドボックス必須) と widget-state.json を共有するための App Group。
        # 非サンドボックス本体でも entitlement さえ持てばコンテナを読み書きできる。
        com.apple.security.application-groups:
          - group.io.vigili.app.shono

  # ============================================================
  # iOS: iPhone / iPad アプリ (Live Activity 対応予定)
  # ============================================================
  VigiliMobile:
    type: application
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: Sources/VigiliMobile
      - path: Sources/Shared
      - path: Sources/SharedMobile
      # Asset Catalog (AppIcon + LaunchScreenBackground + MenuBarIcon)
      - path: Assets.xcassets
        buildPhase: resources
      - path: Resources/Fonts/BricolageGrotesque.ttf
        buildPhase: resources
      - path: Resources/Fonts/JetBrainsMono.ttf
        buildPhase: resources
    dependencies:
      - target: VigiliActivity
        embed: true
    info:
      path: Resources/InfoMobile.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026 Vigili"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - "BricolageGrotesque.ttf"
          - "JetBrainsMono.ttf"
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSSupportsLiveActivities: true
        # APNs push で起きてバックグラウンドでも WS を貼り直せるように。
        UIBackgroundModes:
          - remote-notification
        # QR スキャンでカメラを使うために必須の usage description。
        NSCameraUsageDescription: "Scan the QR code shown on your Mac to connect."
        # Local Network 探索の許可 (Bonjour で同 LAN 上の Mac を見つけるため必須)。
        NSLocalNetworkUsageDescription: "Find Vigili running on your Mac in the local network."
        # Bonjour で browse する service type を列挙 (iOS 14+ で必須)。
        # 旧 daemon との互換のため _sentinel._tcp も残す (新 _vigili._tcp 移行は
        # daemon 側の advertise も同期して変える必要があるため次フェーズ)。
        NSBonjourServices:
          - _sentinel._tcp
          - _vigili._tcp
        # Launch Screen を明示することで、iOS の "iPhone X 互換モード"
        # (上下に黒帯) を回避し、画面全体を使えるようにする。
        # 背景色は Assets.xcassets/LaunchScreenBackground.colorset を参照。
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        # カスタム URL スキーム: vigili://setup?u=...&t=... と
        # 旧 sentinel://setup?u=...&t=... の両方をサポート (移行期)。
        CFBundleURLTypes:
          - CFBundleURLName: io.vigili.mobile.shono
            CFBundleURLSchemes:
              - vigili
              - sentinel
    settings:
      base:
        PRODUCT_NAME: Vigili
        PRODUCT_BUNDLE_IDENTIFIER: io.vigili.mobile.shono
        IPHONEOS_DEPLOYMENT_TARGET: "16.2"
        TARGETED_DEVICE_FAMILY: "1"
        # iOS 実機にインストールするには有効な signing が必須。
        # グローバル設定 CODE_SIGNING_ALLOWED: NO をこのターゲットでは上書きする。
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        # Free Provisioning / Personal Team でも entitlements 最低限で動くように
        ENABLE_BITCODE: "NO"
    # APNs push を受けるための aps-environment entitlement。
    # 有償 Apple Developer Program + App ID の Push capability 有効化が前提。
    entitlements:
      path: Resources/VigiliMobile.entitlements
      properties:
        aps-environment: development

  # ============================================================
  # iOS: Widget Extension (Live Activity 用)
  # ============================================================
  VigiliActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.2"
    sources:
      - path: Sources/VigiliActivity
      - path: Sources/SharedMobile
      # 共有カラーパレット (Theme.accent / Theme.bg など) を Live Activity でも使う。
      # StarPath と同じく Shared から個別ファイルだけ取り込む。
      - path: Sources/Shared/Theme.swift
    info:
      path: Resources/InfoActivity.plist
      properties:
        CFBundleDisplayName: VigiliActivity
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: VigiliActivity
        PRODUCT_BUNDLE_IDENTIFIER: io.vigili.mobile.shono.activity
        IPHONEOS_DEPLOYMENT_TARGET: "16.2"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        SKIP_INSTALL: "YES"  # Extension は app に embed する

  # ============================================================
  # macOS: Widget Extension (Notification Center / Desktop widget)
  # ============================================================
  VigiliWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"  # WidgetKit on macOS Sonoma (Desktop widgets) を含めるため
    sources:
      - path: Sources/VigiliWidget
      # WidgetState の Codable 定義は main app と共有する
      - path: Sources/Shared/WidgetState.swift
      # 星型 path も main app と共有 (Brand.swift と同じ図形)
      - path: Sources/Shared/StarPath.swift
      # 共有カラーパレット (Theme.accent など) を widget でも使う。
      - path: Sources/Shared/Theme.swift
      # widget 自身にも Asset Catalog を埋め込む (chronod が picker で icon を解決するため)
      - path: Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/InfoWidget.plist
      properties:
        CFBundleDisplayName: Vigili
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: "© 2026 Vigili"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_NAME: VigiliWidget
        PRODUCT_BUNDLE_IDENTIFIER: io.vigili.app.shono.widget
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SKIP_INSTALL: "YES"
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "2DG598WNT9"
    # macOS の WidgetKit 拡張は App Sandbox 必須 (無効だと chronod/pkd が登録しない)。
    # サンドボックス下では ~/.vigili を直読みできないため App Group 共有コンテナで
    # widget-state.json を受け渡す。SPEC.md §9.2 参照。
    entitlements:
      path: Resources/VigiliWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.io.vigili.app.shono
